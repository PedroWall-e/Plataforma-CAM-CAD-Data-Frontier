# ══════════════════════════════════════════════════════════════════════════════
# nginx.conf — Configuração Nginx para o Frontend CAD (M23-M24)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen       80;
    server_name  localhost;

    # Charset e compressão
    charset utf-8;
    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # Permitir uploads de PDF (até 50MB)
    client_max_body_size 50M;

    # ── Frontend estático ──────────────────────────────────────────────────────
    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy reverso: /api/ → backend container ───────────────────────────────
    # Em produção Docker, o frontend envia fetch('/api/generate_from_text')
    # e o Nginx repassa para http://backend:8000/generate_from_text
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout generoso para geração VLM (pode levar 30-60s)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Cabeçalhos CORS para deploy Docker
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Max-Age'        1728000;
            add_header 'Content-Type'                  'text/plain charset=UTF-8';
            add_header 'Content-Length'                0;
            return 204;
        }
    }

    # ── Cache de assets estáticos ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Página de erro ─────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
