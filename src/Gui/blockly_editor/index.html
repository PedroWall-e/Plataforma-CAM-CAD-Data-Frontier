<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAD Paramétrico — Editor Visual + Visualizador 3D</title>
  <meta name="description"
    content="Editor visual Blockly com transpilador build123d e visualizador WebGL 3D em tempo real." />

  <!-- ── Blockly ───────────────────────────────────────────────────────── -->
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>

  <!-- ── Three.js ─────────────────────────────────────────────────────── -->
  <script type="importmap">
  {
    "imports": {
      "three":                    "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/":            "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- ── Google Fonts ─────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <style>
    /* ── Design System ─────────────────────────────────────────────────── */
    :root {
      --bg: #0e1117;
      --surface: #161b27;
      --surface2: #1e2535;
      --surface3: #252d3d;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #3d7fff;
      --accent-glow: rgba(61, 127, 255, 0.25);
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #f87171;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout root ────────────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: 52px 1fr;
      height: 100vh;
    }

    /* ── Topbar ─────────────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .topbar__brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
    }

    .topbar__icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #3d7fff, #7c3aed);
      border-radius: 7px;
      display: grid;
      place-items: center;
      font-size: 14px;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(61, 127, 255, .3);
    }

    .topbar__center {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #server-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .dot.online {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .dot.offline {
      background: var(--error);
    }

    .dot.pending {
      background: var(--warning);
      animation: blink .8s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .topbar__actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
    }

    .btn--primary {
      background: var(--accent);
      color: #fff;
    }

    .btn--primary:hover {
      background: #5590ff;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .btn--ghost {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }

    .btn--ghost:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, .2);
    }

    /* ── Main 3-column layout ───────────────────────────────────────────── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 340px 380px;
      height: 100%;
      overflow: hidden;
    }

    /* ── Blockly pane ───────────────────────────────────────────────────── */
    .pane {
      position: relative;
      overflow: hidden;
    }

    #blockly-canvas {
      width: 100%;
      height: 100%;
    }

    /* ── Code pane ──────────────────────────────────────────────────────── */
    .pane--code {
      display: grid;
      grid-template-rows: 40px 1fr 36px;
      border-left: 1px solid var(--border);
      background: var(--surface2);
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
    }

    .pane-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--text-muted);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--success);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    #code-output {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      padding: 14px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.75;
      color: #a5f3fc;
      caret-color: var(--accent);
    }

    .pane-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }

    #status-code {
      transition: color .3s;
    }

    #status-code.ok {
      color: var(--success);
    }

    #status-code.error {
      color: var(--error);
    }

    /* ── 3D viewer pane ─────────────────────────────────────────────────── */
    .pane--viewer {
      display: grid;
      grid-template-rows: 40px 1fr 36px;
      border-left: 1px solid var(--border);
      background: #080c12;
    }

    #viewer-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #render-spinner {
      position: absolute;
      inset: 40px 0 36px 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8, 12, 18, .7);
      backdrop-filter: blur(4px);
      font-size: 13px;
      color: var(--accent);
      gap: 8px;
      z-index: 5;
    }

    #render-spinner.visible {
      display: flex;
    }

    .spinner-ring {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(61, 127, 255, .3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #viewer-status {
      transition: color .3s;
    }

    #viewer-status.ok {
      color: var(--success);
    }

    #viewer-status.error {
      color: var(--error);
    }

    #viewer-status.loading {
      color: var(--warning);
    }

    /* ── AI Chat Panel ──────────────────────────────────────────────────── */
    .pane--viewer {
      grid-template-rows: 40px 1fr 220px 36px !important;
    }

    .ai-panel {
      display: grid;
      grid-template-rows: 32px 1fr 42px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }

    .ai-panel__header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--text-muted);
    }

    .ai-panel__gem {
      font-size: 13px;
      animation: gem-pulse 3s ease-in-out infinite;
    }

    @keyframes gem-pulse {

      0%,
      100% {
        filter: drop-shadow(0 0 0px #7c3aed);
      }

      50% {
        filter: drop-shadow(0 0 6px #a855f7);
      }
    }

    /* Chat history log */
    #ai-log {
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      line-height: 1.55;
      scrollbar-width: thin;
      scrollbar-color: var(--surface3) transparent;
    }

    .ai-msg {
      display: flex;
      align-items: flex-start;
      gap: 7px;
    }

    .ai-msg--user {
      flex-direction: row-reverse;
    }

    .ai-msg__bubble {
      max-width: 82%;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
    }

    .ai-msg--user .ai-msg__bubble {
      background: var(--accent);
      color: #fff;
      border-radius: 10px 2px 10px 10px;
    }

    .ai-msg--agent .ai-msg__bubble {
      background: var(--surface2);
      color: var(--text-muted);
      border-radius: 2px 10px 10px 10px;
    }

    .ai-msg--status .ai-msg__bubble {
      background: transparent;
      color: var(--text-muted);
      font-style: italic;
      font-size: 11px;
      padding: 2px 4px;
    }

    /* Input row */
    .ai-panel__input {
      display: flex;
      gap: 8px;
      padding: 6px 10px;
      border-top: 1px solid var(--border);
      align-items: flex-end;
    }

    #ai-prompt {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 12.5px;
      padding: 7px 10px;
      resize: none;
      outline: none;
      height: 30px;
      max-height: 80px;
      overflow-y: auto;
      transition: border-color .2s, height .15s;
      line-height: 1.4;
    }

    #ai-prompt:focus {
      border-color: var(--accent);
    }

    #ai-prompt::placeholder {
      color: var(--text-muted);
    }

    #btn-ai-generate {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 14px;
      transition: all .15s;
      position: relative;
      overflow: hidden;
    }

    #btn-ai-generate:hover {
      transform: scale(1.08);
      box-shadow: 0 0 14px var(--accent-glow);
    }

    #btn-ai-generate:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    #btn-ai-generate .btn-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    #btn-ai-generate.loading .btn-icon {
      display: none;
    }

    #btn-ai-generate.loading .btn-spinner {
      display: block;
    }

    /* ── PDF Upload button ──────────────────────────────────────────────── */
    #btn-pdf-upload {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(245, 158, 11, 0.12);
      /* amber glassmorphism */
      border: 1px solid rgba(245, 158, 11, 0.28);
      color: #f59e0b;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 14px;
      transition: all .15s;
      backdrop-filter: blur(4px);
    }

    #btn-pdf-upload:hover {
      background: rgba(245, 158, 11, 0.22);
      border-color: rgba(245, 158, 11, 0.55);
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.35);
      transform: scale(1.07);
    }

    #btn-pdf-upload:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
    }

    /* ── STEP Download button ────────────────────────────────────────── */
    #btn-download-step {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 7px;
      font-size: 11.5px;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #059669, #0d9488);
      color: #fff;
      transition: all .15s;
      letter-spacing: .2px;
    }

    #btn-download-step:hover:not(:disabled) {
      background: linear-gradient(135deg, #10b981, #14b8a6);
      box-shadow: 0 0 14px rgba(16, 185, 129, 0.45);
      transform: translateY(-1px);
    }

    #btn-download-step:disabled {
      opacity: .35;
      cursor: not-allowed;
      background: var(--surface3);
      transform: none;
    }

    /* ── Blockly dark overrides ─────────────────────────────────────────── */
    .blocklyToolboxDiv {
      background: var(--surface2) !important;
      border-right: 1px solid var(--border) !important;
    }

    .blocklyTreeLabel {
      color: var(--text) !important;
      font-family: var(--sans) !important;
    }

    .blocklyFlyoutBackground {
      fill: var(--surface) !important;
    }

    .blocklyMainBackground {
      fill: #0c1019 !important;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- ── Topbar ──────────────────────────────────────────────────────── -->
    <header class="topbar">
      <div class="topbar__brand">
        <div class="topbar__icon">⬡</div>
        CAD Paramétrico
        <span class="badge">M24 · Produção</span>
      </div>

      <div class="topbar__center">
        <div id="server-status">
          <span class="dot" id="server-dot"></span>
          <span id="server-label">Verificando servidor…</span>
        </div>
      </div>

      <div class="topbar__actions">
        <button class="btn btn--ghost" id="btn-clear">🗑 Limpar</button>
        <button class="btn btn--ghost" id="btn-copy">⎘ Copiar Código</button>
        <button class="btn btn--primary" id="btn-generate">▶ Gerar Agora</button>
      </div>
    </header>

    <!-- ── Main layout ─────────────────────────────────────────────────── -->
    <div class="main-layout">

      <!-- Blockly -->
      <div class="pane">
        <div id="blockly-canvas"></div>
      </div>

      <!-- Code output -->
      <div class="pane pane--code">
        <div class="pane-header">
          <span class="pane-title">Python · build123d</span>
          <span class="live-badge"><span class="live-dot"></span>Tempo real</span>
        </div>
        <textarea id="code-output" spellcheck="false" readonly
          placeholder="# Arraste blocos para gerar código…"></textarea>
        <div class="pane-footer">
          <span>Builder Mode</span>
          <span id="status-code">Aguardando…</span>
        </div>
      </div>

      <!-- 3D Viewer + AI Chat Panel -->
      <div class="pane pane--viewer">

        <!-- Viewer header -->
        <div class="pane-header">
          <span class="pane-title">Visualizador 3D — WebGL</span>
          <span id="viewer-status">Aguardando modelo…</span>
        </div>

        <!-- Three.js canvas -->
        <div style="position:relative;">
          <canvas id="viewer-canvas"></canvas>
          <div id="render-spinner"><span class="spinner-ring"></span>Gerando B-Rep…</div>
        </div>

        <!-- ── AI Prompt Panel ─────────────────────────────────────────── -->
        <div class="ai-panel" id="ai-panel">

          <div class="ai-panel__header">
            <span class="ai-panel__gem">✦</span>
            Gemini CAD · Linguagem Natural
          </div>

          <!-- Chat history -->
          <div id="ai-log" aria-live="polite" aria-label="Histórico de mensagens IA"></div>

          <!-- Input row -->
          <div class="ai-panel__input">
            <textarea id="ai-prompt" rows="1" placeholder="Descreva a peça… Ex: cubo 30mm com furo cilíndrico central"
              aria-label="Prompt de IA para gerar modelo 3D"></textarea>

            <!-- PDF upload: input oculto + botão 📎 -->
            <input type="file" id="pdf-file-input" accept=".pdf" style="display:none" aria-hidden="true" />
            <button id="btn-pdf-upload" title="Carregar PDF com planta 2D (engenharia reversa VLM)"
              aria-label="Upload de PDF">
              📎
            </button>

            <button id="btn-ai-generate" title="Gerar modelo por IA (Enter)" aria-label="Gerar por IA">
              <span class="btn-icon">✦</span>
              <span class="btn-spinner"></span>
            </button>
          </div>
        </div>

        <!-- Footer -->
        <div class="pane-footer">
          <button id="btn-download-step" disabled title="Gere um modelo via IA primeiro">
            📥 Baixar STEP <span style="opacity:.7;font-weight:400">(CAD Industrial)</span>
          </button>
          <span id="triangle-count">—</span>
        </div>
      </div>

    </div><!-- .main-layout -->
  </div><!-- .app -->

  <!-- ── Toolbox XML ──────────────────────────────────────────────────── -->
  <xml id="toolbox" style="display:none">
    <category name="Estrutura" colour="#3d7fff">
      <block type="cad_buildpart"></block>
    </category>
    <category name="Primitivas" colour="#7c3aed">
      <block type="cad_box"></block>
      <block type="cad_cylinder"></block>
    </category>
    <category name="Operações" colour="#059669">
      <block type="cad_fillet"></block>
    </category>
    <category name="Exportar" colour="#d97706">
      <block type="cad_export_step"></block>
      <block type="cad_export_stl"></block>
    </category>
  </xml>

  <!-- ── Scripts (ordem obrigatória) ───────────────────────────────────── -->
  <script src="custom_blocks.js"></script>
  <script src="transpiler.js"></script>
  <!-- main.js carrega Three.js como módulo ES -->
  <script type="module" src="main.js"></script>
</body>

</html>
