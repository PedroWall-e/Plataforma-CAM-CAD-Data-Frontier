<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAD MVP — OpenCASCADE + Three.js</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="viewport"></div>

    <div id="hud">
      <h1>CAD MVP · OpenCASCADE</h1>
      <div style="display:flex;gap:12px;align-items:center">
        <div id="stats">—</div>
        <!-- Selector de unidades -->
        <div id="unit-selector">
          <button class="unit-btn active" data-unit="mm">mm</button>
          <button class="unit-btn"         data-unit="cm">cm</button>
        </div>
      </div>
    </div>

    <!-- Painel de info do objeto selecionado -->
    <div id="obj-info">
      <div class="info-row"><span class="info-lbl">Pos</span><span id="info-pos">—</span></div>
      <div class="info-row"><span class="info-lbl">Size</span><span id="info-size">—</span></div>
    </div>

    <!-- Input overlay para valor exato de transform -->
    <div id="transform-input" style="display:none">
      <label id="transform-input-label">Move X</label>
      <input id="transform-input-val" type="number" step="1" value="0" />
      <button id="transform-input-ok">OK</button>
      <button id="transform-input-cancel">✕</button>
    </div>

    <div id="error-log"></div>

    <div id="controls">
      <!-- Selector de tipo -->
      <div id="prim-selector">
        <button class="prim-btn active" data-type="box"      id="btn-box">Box</button>
        <button class="prim-btn"        data-type="cylinder" id="btn-cylinder">Cylinder</button>
        <button class="prim-btn"        data-type="sphere"   id="btn-sphere">Sphere</button>
        <button class="prim-btn"        data-type="cone"     id="btn-cone">Cone</button>
      </div>

      <div class="sep"></div>

      <!-- Controlo de transformação -->
      <div id="tr-selector" style="display:flex;gap:6px;align-self:center">
        <button class="tr-btn active" data-mode="translate" title="Mover [G]">↔ Move</button>
        <button class="tr-btn"        data-mode="rotate"    title="Rodar [R]">↻ Rotate</button>
        <button class="tr-btn"        data-mode="scale"     title="Escalar [S]">⤢ Scale</button>
      </div>

      <div class="sep"></div>

      <!-- Face Snap Mode -->
      <div id="face-snap-row" style="display:flex;gap:8px;align-items:center;align-self:center">
        <button id="btn-face-snap" title="Selecione uma face de cada objeto para os grudar">🧲 Face Snap</button>
        <select id="snap-align" title="Modo de alinhamento do Face Snap">
          <option value="face">Face ↔ Face</option>
          <option value="center">Centro ↔ Centro</option>
        </select>
        <span id="snap-status"></span>
      </div>

      <div class="sep"></div>

      <!-- Inputs dinâmicos por primitiva -->
      <div id="params-box" class="params-group" style="display:flex;gap:10px">
        <div class="ctrl"><label>Width</label>  <input id="box-w" type="number" value="50" min="1" step="1"/></div>
        <div class="ctrl"><label>Height</label> <input id="box-h" type="number" value="50" min="1" step="1"/></div>
        <div class="ctrl"><label>Depth</label>  <input id="box-d" type="number" value="50" min="1" step="1"/></div>
      </div>
      <div id="params-cylinder" class="params-group" style="display:none;gap:10px">
        <div class="ctrl"><label>Radius</label> <input id="cyl-r" type="number" value="25" min="1" step="1"/></div>
        <div class="ctrl"><label>Height</label> <input id="cyl-h" type="number" value="60" min="1" step="1"/></div>
      </div>
      <div id="params-sphere" class="params-group" style="display:none;gap:10px">
        <div class="ctrl"><label>Radius</label> <input id="sph-r" type="number" value="30" min="1" step="1"/></div>
      </div>
      <div id="params-cone" class="params-group" style="display:none;gap:10px">
        <div class="ctrl"><label>R Bottom</label> <input id="cone-rb" type="number" value="25" min="1"  step="1"/></div>
        <div class="ctrl"><label>R Top</label>    <input id="cone-rt" type="number" value="0"  min="0"  step="1"/></div>
        <div class="ctrl"><label>Height</label>   <input id="cone-h"  type="number" value="60" min="1"  step="1"/></div>
      </div>

      <div class="sep"></div>

      <!-- Snap Mode -->
      <div style="display:flex;gap:6px;align-items:center;align-self:center">
        <label style="font-size:11px;color:#8899aa">Snap</label>
        <select id="snap-mode" title="Modo de snapping durante o drag">
          <option value="off">Off</option>
          <option value="face">Face Auto</option>
        </select>
      </div>

      <div class="sep"></div>
      <button id="btn">Generate</button>
      <button id="btn-floor" title="Assentar o objeto no grid (Y=0)">⬇ Floor</button>
      <button id="btn-delete" title="Apagar objeto selecionado [Del]">🗑 Delete</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
